<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the People - Resgate de Emergência</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>

<body>
    <div id="game-container">
        <!-- HUD Superior -->
        <div id="hud">
            <div class="hud-item" id="level-display">Nível: <span>1</span></div>
            <div class="hud-item" id="timer-display">Tempo: <span>60s</span></div>
            <div class="hud-item" id="rescue-display">Salvos: <span>0/5</span></div>
        </div>

        <!-- Telas de Estado -->
        <div id="overlay">
            <div id="menu-content" class="modal">
                <h1>Save the People</h1>
                <p>Resgate todas as pessoas e leve-as para a casa antes que o tempo acabe!</p>
                <button id="start-btn">Iniciar Missão</button>
            </div>

            <div id="win-content" class="modal hidden">
                <h1>Missão Cumprida!</h1>
                <p>Você salvou todos a tempo.</p>
                <button id="next-btn">Próximo Nível</button>
            </div>

            <div id="gameover-content" class="modal hidden">
                <h1>Missão Falhou</h1>
                <p id="fail-message">O tempo acabou ou você não resgatou todos.</p>
                <button id="retry-btn">Tentar Novamente</button>
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>

</html>
